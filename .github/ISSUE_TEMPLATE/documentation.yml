name: Documentation
description: Report docs issues or suggestions
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation Issue
      description: What's wrong or missing?
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: Which file or page?
      placeholder: "e.g., docs/getting-started.md"
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should it be changed?
