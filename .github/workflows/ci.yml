name: CI

on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: [main, trunk]
    # Support PRs from forks - this is the cost-efficient approach
    # External contributors must fork and submit PRs
    # No direct branch creation costs on the org repo

types:
  - opened
  - synchronize
  - reopened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Basic validation (runs on all PRs including forks)
  # ============================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check shell script syntax
        run: |
          echo "Checking shell script syntax..."
          for script in bin/workstation install-cli.sh scripts/*.sh; do
            if [[ -f "$script" ]]; then
              echo "Checking $script..."
              bash -n "$script" || exit 1
            fi
          done
          echo "✓ All scripts have valid syntax"

      - name: Check file structure
        run: |
          echo "Checking file structure..."
          test -f bin/workstation || (echo "Missing bin/workstation" && exit 1)
          test -f install-cli.sh || (echo "Missing install-cli.sh" && exit 1)
          test -f README.md || (echo "Missing README.md" && exit 1)
          test -x bin/workstation || (echo "bin/workstation not executable" && exit 1)
          echo "✓ File structure OK"

      - name: Check documentation
        run: |
          echo "Checking documentation..."
          test -f docs/architecture.md || (echo "Missing docs/architecture.md" && exit 1)
          test -f docs/getting-started.md || (echo "Missing docs/getting-started.md" && exit 1)
          test -f docs/cli.md || (echo "Missing docs/cli.md" && exit 1)
          test -f LICENSE || (echo "Missing LICENSE" && exit 1)
          echo "✓ Documentation complete"

  # ============================================
  # Functional tests (runs on all PRs)
  # ============================================
  test:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run test suite
        run: |
          echo "Running test suite..."
          bash tests/test-workstation.sh

  # ============================================
  # Integration test (runs on PRs from maintainers only)
  # Fork PRs skip this to avoid permission issues
  # ============================================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [validate, test]
    # Only run integration tests for non-fork PRs or push to main
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "Test User"
          git config --global user.email "test@example.com"

      - name: Test installation
        run: |
          echo "Testing installation..."
          bash install-cli.sh
          test -f ~/.local/bin/workstation || (echo "Installation failed" && exit 1)
          echo "✓ Installation successful"

      - name: Test CLI help
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          workstation help > /dev/null || (echo "CLI help failed" && exit 1)
          echo "✓ CLI help works"

  # ============================================
  # Security scan (runs on all PRs)
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          echo "Scanning for potential secrets..."
          # Check for common secret patterns
          if grep -r "ghp_[a-zA-Z0-9]*" --include="*.sh" --include="*.md" . 2>/dev/null; then
            echo "Error: Found potential GitHub token"
            exit 1
          fi
          if grep -r "sk-[a-zA-Z0-9]*" --include="*.sh" --include="*.md" . 2>/dev/null; then
            echo "Error: Found potential API key pattern"
            exit 1
          fi
          echo "✓ No obvious secrets found"

      - name: Check file permissions
        run: |
          echo "Checking file permissions..."
          # Ensure scripts are executable
          test -x bin/workstation || (echo "bin/workstation should be executable" && exit 1)
          echo "✓ Permissions OK"

  # ============================================
  # Trunk merge check
  # Validates that PR is ready for trunk (main)
  # ============================================
  trunk-ready:
    name: Trunk Ready Check
    runs-on: ubuntu-latest
    needs: [validate, test, security]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch naming
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"
          
          # Allow specific branch patterns
          if [[ "$BRANCH" =~ ^feat/ ]] || [[ "$BRANCH" =~ ^feature/ ]] || [[ "$BRANCH" =~ ^fix/ ]] || [[ "$BRANCH" =~ ^hotfix/ ]] || [[ "$BRANCH" =~ ^docs/ ]]; then
            echo "✓ Branch name follows convention"
          elif [[ "$BRANCH" =~ ^dependabot/ ]] || [[ "$BRANCH" =~ ^renovate/ ]]; then
            echo "✓ Automated PR branch"
          else
            echo "⚠ Branch name '$BRANCH' doesn't follow conventional patterns"
            echo "  Expected: feat/*, feature/*, fix/*, hotfix/*, docs/*"
          fi

      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.length < 10) {
              core.warning('PR description is very short. Consider adding more context.');
            }

  # ============================================
  # Summary
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate, test, security, trunk-ready]
    if: always()
    
    steps:
      - name: Report status
        run: |
          echo "CI Pipeline Complete"
          echo "==================="
          echo "This PR is from: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "Target repository: ${{ github.repository }}"
          
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo ""
            echo "📝 Note: This is a fork-based contribution"
            echo "   Integration tests were skipped (forks don't have repo permissions)"
            echo "   A maintainer will need to verify integration manually"
          fi
